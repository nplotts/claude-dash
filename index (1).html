<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Excel Sports — Claude Project Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #0a0e17; color: #f1f5f9; font-family: 'DM Sans', 'Segoe UI', sans-serif; padding: 40px 24px; }
  @keyframes fadeUp { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .container { max-width: 960px; margin: 0 auto; }

  /* Header */
  .org-badge { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .org-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 12px rgba(34,197,94,0.5); }
  .org-name { font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  .live-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(34,197,94,0.12); color: #22c55e; font-weight: 600; margin-left: 4px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  h1 { font-size: 34px; font-weight: 800; background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { margin: 8px 0 0; font-size: 13px; color: rgba(255,255,255,0.35); }

  /* Buttons */
  .btn-refresh { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: rgba(255,255,255,0.4); font-size: 18px; cursor: pointer; transition: all 0.2s; }
  .btn-refresh:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
  .btn-add { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 10px; border: none; background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(59,130,246,0.3); font-family: inherit; }
  .btn-add.cancel { background: rgba(239,68,68,0.15); color: #f87171; box-shadow: none; }
  .btn-add .icon { font-size: 18px; line-height: 1; transition: transform 0.2s; }
  .btn-add.cancel .icon { transform: rotate(45deg); }

  /* Stats */
  .stats { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat-card { flex: 1 1 130px; padding: 18px 22px; border-radius: 14px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); min-width: 120px; }
  .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
  .stat-value { font-size: 30px; font-weight: 800; line-height: 1; }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .filter-btn.active { border-color: rgba(59,130,246,0.5); background: rgba(59,130,246,0.15); color: #93c5fd; }
  .filter-count { margin-left: 4px; opacity: 0.6; }

  /* Cards */
  .card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 20px 24px; cursor: pointer; transition: all 0.25s ease; border-left: 3px solid; margin-bottom: 10px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .card-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .card-title { font-size: 17px; font-weight: 700; color: #f1f5f9; }
  .card-desc { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.5; }
  .priority-badge { padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .chevron { font-size: 18px; color: rgba(255,255,255,0.25); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  /* Expanded */
  .card-body { margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.06); }
  .status-switcher { margin-bottom: 18px; }
  .status-switcher-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
  .status-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .status-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; text-transform: uppercase; font-family: inherit; }
  .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; font-size: 13px; }
  .meta-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); display: block; }
  .meta-value { color: #e2e8f0; margin-top: 4px; }
  .meta-notes { color: #cbd5e1; margin-top: 4px; line-height: 1.6; }
  .full-width { grid-column: 1 / -1; }

  /* Add Form */
  .add-form { background: rgba(255,255,255,0.03); border: 1px solid rgba(59,130,246,0.3); border-radius: 14px; padding: 24px; border-left: 3px solid #3b82f6; margin-bottom: 20px; }
  .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .form-title { font-size: 16px; font-weight: 700; color: #93c5fd; }
  .form-close { background: transparent; border: none; color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: #f1f5f9; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: rgba(59,130,246,0.5); }
  .form-input::placeholder { color: rgba(255,255,255,0.2); }
  textarea.form-input { resize: vertical; min-height: 60px; }
  input[type="date"].form-input { color-scheme: dark; }
  .form-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(255,255,255,0.35); margin-bottom: 6px; display: block; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel { padding: 9px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-submit { padding: 9px 24px; border-radius: 8px; border: none; background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(59,130,246,0.3); font-family: inherit; }
  .btn-submit:disabled { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.2); cursor: not-allowed; box-shadow: none; }
  .option-btn { padding: 5px 12px; border-radius: 7px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.3px; font-family: inherit; }

  /* Toast */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; background: rgba(30,41,59,0.95); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; font-size: 13px; font-weight: 600; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: fadeUp 0.3s ease; }

  /* Footer */
  .footer { margin-top: 36px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; font-size: 11px; color: rgba(255,255,255,0.18); }

  /* Loading */
  .loading { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .spinner { width: 32px; height: 32px; border: 3px solid rgba(59,130,246,0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }

  /* Error */
  .error-bar { padding: 16px 20px; border-radius: 10px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; font-size: 13px; margin-bottom: 20px; }
  .error-btn { margin-left: 12px; background: transparent; border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }

  .empty { padding: 40px; text-align: center; color: rgba(255,255,255,0.25); font-size: 14px; }
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxkGLaqBCqDoRNxjIAxosfgyfRSdYJW2AL9nA0Mb0I57YkeJdRVzeyUwgErcSnpHYkw8A/exec";

const STATUS_CONFIG = {
  "In Progress": { color: "#22c55e", bg: "rgba(34,197,94,0.12)", border: "rgba(34,197,94,0.3)", order: 0, icon: "▶" },
  "Idea": { color: "#eab308", bg: "rgba(234,179,8,0.12)", border: "rgba(234,179,8,0.3)", order: 1, icon: "💡" },
  "Completed": { color: "#3b82f6", bg: "rgba(59,130,246,0.12)", border: "rgba(59,130,246,0.3)", order: 2, icon: "✓" },
  "Canceled": { color: "#ef4444", bg: "rgba(239,68,68,0.12)", border: "rgba(239,68,68,0.3)", order: 3, icon: "✕" },
};
const STATUSES = ["In Progress", "Idea", "Completed", "Canceled"];
const PRIORITIES = ["High", "Medium", "Low"];
const PRIORITY_WEIGHT = { High: 0, Medium: 1, Low: 2 };
const PRIORITY_COLORS = { High: "#f87171", Medium: "#fbbf24", Low: "#64748b" };
const today = () => new Date().toISOString().slice(0, 10);

let state = { projects: [], filter: "All", expandedId: null, showForm: false, loading: true, error: null, toast: null, saving: false };

function sortProjects(projects) {
  return [...projects].sort((a, b) => {
    const sd = (STATUS_CONFIG[a.status]?.order ?? 99) - (STATUS_CONFIG[b.status]?.order ?? 99);
    if (sd !== 0) return sd;
    const pd = (PRIORITY_WEIGHT[a.priority] ?? 99) - (PRIORITY_WEIGHT[b.priority] ?? 99);
    if (pd !== 0) return pd;
    return new Date(b.dateAdded) - new Date(a.dateAdded);
  });
}

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 2500);
}

async function loadProjects() {
  state.loading = true; state.error = null; render();
  try {
    const res = await fetch(API_URL + "?action=getAll");
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.projects = data.projects || [];
  } catch (e) {
    state.error = "Couldn't connect to the Sheet. Check the URL and deployment.";
  }
  state.loading = false; render();
}

async function updateStatus(id, newStatus) {
  const proj = state.projects.find(p => p.id === id);
  state.projects = state.projects.map(p => p.id === id ? { ...p, status: newStatus } : p);
  render();
  try {
    await fetch(`${API_URL}?action=updateStatus&id=${encodeURIComponent(id)}&status=${encodeURIComponent(newStatus)}`);
    showToast(`${proj?.name} → ${newStatus}`);
  } catch { showToast("Failed to save — try again"); }
}

async function addProject(data) {
  state.saving = true; render();
  try {
    await fetch(`${API_URL}?action=addProject&data=${encodeURIComponent(JSON.stringify(data))}`);
    state.projects.push(data);
    state.showForm = false;
    showToast(`Added: ${data.name}`);
  } catch { showToast("Failed to add — try again"); }
  state.saving = false; render();
}

function getFiltered() {
  const base = state.filter === "All" ? state.projects : state.projects.filter(p => p.status === state.filter);
  return sortProjects(base);
}

function getCounts() {
  return {
    total: state.projects.length,
    inProgress: state.projects.filter(p => p.status === "In Progress").length,
    idea: state.projects.filter(p => p.status === "Idea").length,
    completed: state.projects.filter(p => p.status === "Completed").length,
    canceled: state.projects.filter(p => p.status === "Canceled").length,
  };
}

function render() {
  const app = document.getElementById("app");

  if (state.loading) {
    app.innerHTML = `<div class="loading"><div class="spinner"></div><div style="font-size:14px;opacity:0.4">Loading from Google Sheets...</div></div>`;
    return;
  }

  const c = getCounts();
  const filtered = getFiltered();
  const filters = ["All", "In Progress", "Idea", "Completed", "Canceled"];

  let html = `
    <!-- Header -->
    <div style="margin-bottom:36px">
      <div class="org-badge">
        <div class="org-dot"></div>
        <span class="org-name">Excel Sports Management</span>
        <span class="live-tag">LIVE</span>
      </div>
      <div class="header-row">
        <div>
          <h1>Claude Project Tracker</h1>
          <p class="subtitle">Synced with Google Sheets · Click cards to update</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-refresh" onclick="loadProjects()" title="Refresh">↻</button>
          <button class="btn-add ${state.showForm ? 'cancel' : ''}" onclick="state.showForm=!state.showForm;render()">
            <span class="icon">+</span> ${state.showForm ? 'Cancel' : 'New Project'}
          </button>
        </div>
      </div>
    </div>`;

  if (state.error) {
    html += `<div class="error-bar">${state.error}<button class="error-btn" onclick="loadProjects()">Retry</button></div>`;
  }

  if (state.showForm) {
    html += `
    <div class="add-form">
      <div class="form-header">
        <h3 class="form-title">New Project</h3>
        <button class="form-close" onclick="state.showForm=false;render()">✕</button>
      </div>
      <div class="form-grid">
        <div class="full-width">
          <label class="form-label">Project Name *</label>
          <input class="form-input" id="f-name" placeholder="e.g. Draft Day Analytics Tool" />
        </div>
        <div class="full-width">
          <label class="form-label">Description</label>
          <input class="form-input" id="f-desc" placeholder="One-liner on what it does" />
        </div>
        <div>
          <label class="form-label">Owner</label>
          <input class="form-input" id="f-owner" placeholder="Who's driving this" />
        </div>
        <div>
          <label class="form-label">Target Deadline</label>
          <input type="date" class="form-input" id="f-deadline" />
        </div>
        <div>
          <label class="form-label">Status</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap" id="f-status-btns">
            ${STATUSES.map(s => {
              const cfg = STATUS_CONFIG[s];
              return `<button class="option-btn" data-status="${s}" style="border:1.5px solid ${s === 'Idea' ? cfg.color : 'rgba(255,255,255,0.08)'};background:${s === 'Idea' ? cfg.bg : 'transparent'};color:${s === 'Idea' ? cfg.color : 'rgba(255,255,255,0.3)'}" onclick="selectFormStatus('${s}')">${s}</button>`;
            }).join('')}
          </div>
        </div>
        <div>
          <label class="form-label">Priority</label>
          <div style="display:flex;gap:6px" id="f-priority-btns">
            ${PRIORITIES.map(p => {
              const c = PRIORITY_COLORS[p];
              return `<button class="option-btn" data-priority="${p}" style="border:1.5px solid ${p === 'Medium' ? c : 'rgba(255,255,255,0.08)'};background:${p === 'Medium' ? c + '18' : 'transparent'};color:${p === 'Medium' ? c : 'rgba(255,255,255,0.3)'}" onclick="selectFormPriority('${p}')">${p}</button>`;
            }).join('')}
          </div>
        </div>
        <div class="full-width">
          <label class="form-label">Notes</label>
          <textarea class="form-input" id="f-notes" rows="3" placeholder="Any additional context..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="state.showForm=false;render()">Cancel</button>
        <button class="btn-submit" id="f-submit" onclick="submitForm()">${state.saving ? 'Saving...' : 'Add Project'}</button>
      </div>
    </div>`;
  }

  // Stats
  html += `
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" style="color:#f1f5f9">${c.total}</div></div>
      <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value" style="color:#22c55e">${c.inProgress}</div></div>
      <div class="stat-card"><div class="stat-label">Ideas</div><div class="stat-value" style="color:#eab308">${c.idea}</div></div>
      <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value" style="color:#3b82f6">${c.completed}</div></div>
    </div>`;

  // Filters
  html += `<div class="filters">`;
  filters.forEach(f => {
    const cnt = f === "All" ? c.total : f === "In Progress" ? c.inProgress : f === "Idea" ? c.idea : f === "Completed" ? c.completed : c.canceled;
    html += `<button class="filter-btn ${state.filter === f ? 'active' : ''}" onclick="state.filter='${f}';render()">${f}<span class="filter-count">${cnt}</span></button>`;
  });
  html += `</div>`;

  // Cards
  if (filtered.length === 0) {
    html += `<div class="empty">No projects in this category.</div>`;
  } else {
    filtered.forEach(p => {
      const cfg = STATUS_CONFIG[p.status] || STATUS_CONFIG["Idea"];
      const pc = PRIORITY_COLORS[p.priority] || "#64748b";
      const expanded = state.expandedId === p.id;
      html += `
      <div class="card" style="border-left-color:${cfg.color};${expanded ? `border-color:${cfg.border}` : ''}" onclick="state.expandedId=state.expandedId==='${p.id}'?null:'${p.id}';render()">
        <div class="card-header">
          <div style="flex:1;min-width:200px">
            <div class="card-title-row">
              <span class="card-title">${p.name}</span>
              <span class="priority-badge" style="color:${pc};background:${pc}18">${p.priority}</span>
            </div>
            <p class="card-desc">${p.description || ''}</p>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
            <span class="status-pill" style="color:${cfg.color};background:${cfg.bg};border:1px solid ${cfg.border}">
              <span class="status-dot" style="background:${cfg.color};box-shadow:0 0 6px ${cfg.color}"></span>
              ${p.status}
            </span>
            <span class="chevron ${expanded ? 'open' : ''}">▾</span>
          </div>
        </div>
        ${expanded ? `
        <div class="card-body">
          <div class="status-switcher">
            <div class="status-switcher-label">Change Status</div>
            <div class="status-buttons">
              ${STATUSES.map(s => {
                const sc = STATUS_CONFIG[s];
                const active = p.status === s;
                return `<button class="status-btn" style="border:1.5px solid ${active ? sc.color : 'rgba(255,255,255,0.08)'};background:${active ? sc.bg : 'transparent'};color:${active ? sc.color : 'rgba(255,255,255,0.35)'}" onclick="event.stopPropagation();updateStatus('${p.id}','${s}')"><span style="font-size:11px">${sc.icon}</span> ${s}</button>`;
              }).join('')}
            </div>
          </div>
          <div class="meta-grid">
            <div><span class="meta-label">Owner</span><div class="meta-value">${p.owner || '—'}</div></div>
            <div><span class="meta-label">Deadline</span><div class="meta-value">${p.deadline || '—'}</div></div>
            <div><span class="meta-label">Added</span><div class="meta-value">${p.dateAdded || '—'}</div></div>
            ${p.notes ? `<div class="full-width"><span class="meta-label">Notes</span><div class="meta-notes">${p.notes}</div></div>` : ''}
          </div>
        </div>` : ''}
      </div>`;
    });
  }

  html += `<div class="footer">Powered by Google Sheets · ${new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}</div>`;

  if (state.toast) {
    html += `<div class="toast">${state.toast}</div>`;
  }

  app.innerHTML = html;
}

// Form state
let formStatus = "Idea";
let formPriority = "Medium";

function selectFormStatus(s) {
  formStatus = s;
  document.querySelectorAll('#f-status-btns .option-btn').forEach(btn => {
    const st = btn.dataset.status;
    const cfg = STATUS_CONFIG[st];
    btn.style.borderColor = st === s ? cfg.color : 'rgba(255,255,255,0.08)';
    btn.style.background = st === s ? cfg.bg : 'transparent';
    btn.style.color = st === s ? cfg.color : 'rgba(255,255,255,0.3)';
  });
}

function selectFormPriority(p) {
  formPriority = p;
  document.querySelectorAll('#f-priority-btns .option-btn').forEach(btn => {
    const pr = btn.dataset.priority;
    const c = PRIORITY_COLORS[pr];
    btn.style.borderColor = pr === p ? c : 'rgba(255,255,255,0.08)';
    btn.style.background = pr === p ? c + '18' : 'transparent';
    btn.style.color = pr === p ? c : 'rgba(255,255,255,0.3)';
  });
}

function submitForm() {
  const name = document.getElementById('f-name')?.value?.trim();
  if (!name || state.saving) return;
  addProject({
    id: "proj_" + Date.now(),
    name,
    description: document.getElementById('f-desc')?.value?.trim() || '',
    owner: document.getElementById('f-owner')?.value?.trim() || '',
    status: formStatus,
    priority: formPriority,
    deadline: document.getElementById('f-deadline')?.value || '',
    notes: document.getElementById('f-notes')?.value?.trim() || '',
    dateAdded: today(),
  });
}
